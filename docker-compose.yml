services:
  db:
    image: postgres:17
    container_name: shift_manager_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db_test:
    image: postgres:17
    container_name: shift_manager_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shift_manager_test
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: shift_manager_redis
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  postgres_data:
